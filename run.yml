name: JobRadar Pipeline

on:
  schedule:
    - cron: "0 */3 * * *"   # every 3 hours (UTC)
  workflow_dispatch: {}      # manual trigger from Actions tab

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # needed to commit jobs.db back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests anthropic

      - name: Fetch + store jobs
        run: python storage.py

      - name: Score new jobs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scorer.py

      - name: Send email digest
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python notifier.py

      - name: Commit updated jobs.db
        run: |
          git config user.name  "jobradar-bot"
          git config user.email "actions@github.com"
          git add jobs.db
          git diff --quiet --cached || git commit -m "chore: update jobs.db [skip ci]"
          git push
